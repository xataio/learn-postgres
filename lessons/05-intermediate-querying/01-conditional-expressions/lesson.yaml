checks:
  - id: priority-summary-saved
    type: query-returns
    description: Save the per-priority summary into a priority_summary table.
    sql: SELECT priority, total::int, still_open::int FROM priority_summary ORDER BY CASE priority WHEN 'urgent' THEN 1 WHEN 'high' THEN 2 WHEN 'normal' THEN 3 WHEN 'low' THEN 4 END
    expect:
      rowCount: 4
      rows:
        - [urgent, 2, 2]
        - [high, 2, 1]
        - [normal, 2, 0]
        - [low, 2, 0]
