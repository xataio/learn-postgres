title: Ranges and generated columns
summary: Model spans of time or numbers as first-class values and prevent overlaps with an exclusion constraint, then let Postgres compute columns for you with GENERATED ALWAYS AS STORED.
estimatedMinutes: 14
tags:
  - ranges
  - int4range
  - tstzrange
  - exclusion-constraint
  - generated-columns
authors:
  - exekias
seed: seed.sql
checks:
