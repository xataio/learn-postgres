    type: schema-state
    description: The order_lines table has a generated total column of type numeric.
    table: order_lines
    column: total
    columnType: numeric
  - id: fourth-booking-added
    type: row-count
    description: Add one more non-overlapping booking, giving four rows.
    table: bookings
    expect:
      rowCount: 4
