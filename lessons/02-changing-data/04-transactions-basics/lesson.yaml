title: Transactions basics
summary: BEGIN, COMMIT, ROLLBACK — make a group of statements all-or-nothing — plus savepoints for partial rollback.
estimatedMinutes: 14
tags:
  - transactions
  - begin
  - commit
  - rollback
  - savepoint
authors:
